# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# env = GDK_SCALE,2
# monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
env = GDK_SCALE,1
# monitor = eDP-1, preferred, 0x0, auto
# monitor = HDMI-A-1, 1920x1080, 0x0, auto
# monitor = eDP-1, 2880x1800@120, 0x1080, 1.5

monitor = HDMI-A-1, 1920x1080, 0x0, auto
monitor = eDP-1, 2880x1800@120, 1920x0, 1.5


# Force a 200px "No-Go" zone at the bottom of the HDMI monitor
# monitor = HDMI-A-1, addreserved, 0, 140, 0, 0
# Make eDP-1 left monitor

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2

monitor=eDP-1,disabled
# Monitor 1: Workspaces 1-5
workspace = 1, monitor:HDMI-A-1, persistent:true, default:true
workspace = 2, monitor:HDMI-A-1, persistent:true
workspace = 3, monitor:HDMI-A-1, persistent:true
workspace = 4, monitor:HDMI-A-1, persistent:true
workspace = 5, monitor:HDMI-A-1, persistent:true

# Monitor 2: Workspaces 6-10
# workspace = 4, monitor:eDP-1, persistent:true
# workspace = 5, monitor:eDP-1, persistent:true
# workspace = 6, monitor:eDP-1, persistent:true

workspace = 10, monitor:eDP-1, persistent:true
